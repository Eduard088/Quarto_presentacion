<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participacion electoral en Mexico</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.4/highcharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.4/modules/series-label.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.4/modules/exporting.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.4/modules/export-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.4/modules/accessibility.js"></script>

    <style>
        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Helvetica,
                Arial,
                sans-serif;
            background: white;
            color: black;
        }

        .highcharts-figure,
        .highcharts-data-table table {
            min-width: 310px;
            max-width: 800px;
            margin: 1em auto;
        }

        .highcharts-data-table table {
            font-family: Verdana, sans-serif;
            border-collapse: collapse;
            border: 1px solid #e6e6e6;
            margin: 10px auto;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .highcharts-data-table caption {
            padding: 1em 0;
            font-size: 1.2em;
            color: #666;
        }

        .highcharts-data-table th {
            font-weight: 600;
            padding: 0.5em;
        }

        .highcharts-data-table td,
        .highcharts-data-table th,
        .highcharts-data-table caption {
            padding: 0.5em;
        }

        .highcharts-data-table thead tr,
        .highcharts-data-table tbody tr:nth-child(even) {
            background: #f7f7f7;
        }
    </style>
</head>

<body>

    <figure class="highcharts-figure">
        <div id="container"></div>
    </figure>

    <script>
        Highcharts.setOptions({
            lang: {
                thousandsSep: ','   // <-- evita “10.000”, “11.000”, etc.
            }
        });

        Highcharts.chart('container', {
            chart: {
                type: 'spline',

                width: 750,   
                height: 515   
            },

            title: {
                text: 'Evolución de las votaciones en México 2015 y 2021',
                align: 'left'
            },
            subtitle: {
                text: 'Fuente: <a href="https://siceen21.ine.mx/downloadzip">SICEEN</a>',
                align: 'left'
            },

            xAxis: {
                categories: ['2015', '2018', '2021'],
                title: {
                    text: 'Proceso electoral'
                }
            },

            yAxis: {
                title: {
                    text: 'Votos'
                },
                minorGridLineWidth: 0,
                gridLineWidth: 0,
                alternateGridColor: null,
                plotBands: [
                    { from: 60000000, to: 110000000, color: 'rgba(68, 170, 213, 0.1)', label: { text: 'Participación moderada', style: { opacity: 0.7 }}},
                    { from: 110000000, to: 160000000, color: 'rgba(0, 0, 0, 0)', label: { text: 'Participación alta', style: { opacity: 0.7 }}},
                    { from: 160000000, to: 250000000, color: 'rgba(68, 170, 213, 0.1)', label: { text: 'Participación muy alta', style: { opacity: 0.7 }}}
                ]
            },

            plotOptions: {
                spline: {
                    lineWidth: 4,
                    states: { hover: { lineWidth: 5 }},
                    marker: { enabled: true }
                }
            },

            series: [{
                name: 'Proceso Electoral',
                data: [64313000, 214391000, 112820000]
            }],

            navigation: { menuItemStyle: { fontSize: '10px' }}
        });
    </script>

</body>
</html>
