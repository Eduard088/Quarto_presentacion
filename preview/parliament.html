<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highcharts: Distribución Parlamentaria</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1//highcharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/item-series.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/exporting.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/export-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/accessibility.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fdfdfd;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .highcharts-figure,
        .highcharts-data-table table {
            min-width: 320px;
            max-width: 800px;
            margin: 1em auto;
        }

        #container {
            height: 500px;
        }

        .highcharts-description {
            margin: 1.5rem 10px;
            font-style: italic;
            line-height: 1.6;
            text-align: center;
            color: #666;
        }

        /* Estilos para la tabla de datos generada por el módulo export-data */
        .highcharts-data-table table {
            font-family: Verdana, sans-serif;
            border-collapse: collapse;
            border: 1px solid #ebebeb;
            margin: 10px auto;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .highcharts-data-table th {
            font-weight: 600;
            padding: 0.5em;
            background: #f7f7f7;
        }

        .highcharts-data-table td,
        .highcharts-data-table caption {
            padding: 0.5em;
        }

        .highcharts-data-table tbody tr:nth-child(even) {
            background: #fcfcfc;
        }

        .highcharts-data-table tbody tr:hover {
            background: #f1f7ff;
        }
    </style>
</head>
<body>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        Este gráfico utiliza el tipo de serie <code>item</code> con un diseño de semicírculo. 
        Muestra una proyección ficticia de la distribución de escaños para la legislatura 2025-2029, 
        donde cada punto representa un representante individual en el parlamento.
    </p>
</figure>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        Highcharts.chart('container', {
            chart: {
                type: 'item'
            },

            title: {
                text: 'Distribución de Escaños Proyectada'
            },

            subtitle: {
                text: 'Simulación Legislatura 2025. Fuente: <a href="#">Análisis Ficticio</a>'
            },

            legend: {
                labelFormat: '{name} <span style="opacity: 0.6">({y})</span>'
            },

            series: [{
                name: 'Representantes',
                keys: ['name', 'y', 'color', 'label'],
                data: [
                    ['Bloque Progresista', 185, '#e62e2e', 'BP'],
                    ['Alianza Ciudadana', 142, '#1e90ff', 'AC'],
                    ['Unión Ecológica', 98, '#2ecc71', 'UE'],
                    ['Frente Liberal', 75, '#f1c40f', 'FL'],
                    ['Coalición Conservadora', 110, '#2c3e50', 'CC'],
                    ['Independientes', 23, '#95a5a6', 'IND']
                ],
                dataLabels: {
                    enabled: true,
                    format: '{point.label}',
                    style: {
                        textOutline: '2px contrast',
                        fontSize: '12px'
                    }
                },

                // Opciones de Semicírculo
                center: ['50%', '88%'],
                size: '170%',
                startAngle: -100,
                endAngle: 100
            }],

            responsive: {
                rules: [{
                    condition: {
                        maxWidth: 600
                    },
                    chartOptions: {
                        series: [{
                            dataLabels: {
                                distance: -30
                            }
                        }]
                    }
                }]
            }
        });
    });
</script>

</body>
</html>
