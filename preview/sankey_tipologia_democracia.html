<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankey Diagram - Tipología de la Democracia</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/highcharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/sankey.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/non-cartesian-zoom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/mouse-wheel-zoom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/exporting.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/export-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/accessibility.js"></script>
    
    <style>
        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Helvetica,
                Arial,
                "Apple Color Emoji",
                "Segoe UI Emoji",
                "Segoe UI Symbol",
                sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        #csv {
            display: none;
        }

        .highcharts-figure,
        .highcharts-data-table table {
            min-width: 310px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .highcharts-data-table table {
            font-family: Verdana, sans-serif;
            border-collapse: collapse;
            border: 1px solid var(--highcharts-neutral-color-10, #e6e6e6);
            margin: 10px auto;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .highcharts-data-table caption {
            padding: 1em 0;
            font-size: 1.2em;
            color: var(--highcharts-neutral-color-60, #666);
        }

        .highcharts-data-table th {
            font-weight: 600;
            padding: 0.5em;
        }

        .highcharts-data-table td,
        .highcharts-data-table th,
        .highcharts-data-table caption {
            padding: 0.5em;
        }

        .highcharts-data-table thead tr,
        .highcharts-data-table tbody tr:nth-child(even) {
            background: var(--highcharts-neutral-color-3, #f7f7f7);
        }

        .highcharts-description {
            display: none;
        }

        #container {
            width: 100%;
            height: 500px;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <figure class="highcharts-figure">
        <div id="container"></div>
        <p class="highcharts-description">
            Los diagramas Sankey se utilizan para visualizar el flujo de datos
            entre nodos. Las líneas más anchas indican mayor relevancia o cantidad.
        </p>
    </figure>

    <script>
        Highcharts.setOptions({
            chart: {
                backgroundColor: '#ffffff'
            },
            title: {
                style: {
                    color: '#000000'
                }
            },
            subtitle: {
                style: {
                    color: '#000000'
                }
            }
        });

        Highcharts.chart('container', {

            chart: {
                zooming: {
                    type: 'xy'
                },
                panning: {
                    enabled: true,
                    type: 'xy'
                },
                panKey: 'shift',
                backgroundColor: '#ffffff',
                spacingLeft: 50,
                spacingRight: 50
            },
            title: {
                text: 'Variables de la Democracia Maximalista Según el Autor',
                style: {
                    color: '#000000',
                    fontSize: '18px',
                    fontWeight: 'bold'
                }
            },
            subtitle: {
                text: 'Análisis de Dahl, Bobbio, O\'Donell, Sartori, Przeworski y Laswell',
                style: {
                    color: '#666666',
                    fontSize: '14px'
                }
            },
            accessibility: {
                point: {
                    valueDescriptionFormat: '{index}. {point.from} → {point.to}'
                }
            },
            tooltip: {
                headerFormat: null,
                pointFormat: '<b>{point.fromNode.name}</b> → <b>{point.toNode.name}</b>',
                backgroundColor: '#ffffff',
                borderColor: '#cccccc',
                style: {
                    color: '#000000'
                }
            },
            series: [{
                keys: ['from', 'to', 'weight'],
                nodes: [
                    // COLUMNA 1: VARIABLES INSTITUCIONALES
                    { id: 'Igualdad de oportunidades', color: '#3498db', column: 0 },
                    { id: 'Control ciudadano', color: '#3498db', column: 0 },
                    { id: 'Control y limitación', color: '#3498db', column: 0 },
                    { id: 'Respaldo reglas', color: '#3498db', column: 0 },
                    { id: 'Legitimidad', color: '#3498db', column: 0 },

                    // COLUMNA 1: VARIABLES NO INSTITUCIONALES
                    { id: 'Búsqueda no violenta', color: '#9b59b6', column: 0 },
                    { id: 'Pluralidad', color: '#9b59b6', column: 0 },
                    { id: 'Derechos humanos', color: '#9b59b6', column: 0 },
                    { id: 'Tolerancia', color: '#9b59b6', column: 0 },
                    { id: 'Racionalidad', color: '#9b59b6', column: 0 },
                    { id: 'Paz social', color: '#9b59b6', column: 0 },
                    { id: 'Interés colectivo', color: '#9b59b6', column: 0 },

                    // COLUMNA 1: VARIABLES MINIMALISTAS
                    { id: 'Derecho al voto', color: '#e74c3c', column: 0 },
                    { id: 'Mercado', color: '#e74c3c', column: 0 },
                    { id: 'Libertad', color: '#e74c3c', column: 0 },

                    // COLUMNA 2: CATEGORÍAS
                    { id: 'Institucionales', color: '#2980b9', column: 1 },
                    { id: 'No Institucionales', color: '#8e44ad', column: 1 },
                    { id: 'Minimalistas', color: '#c0392b', column: 1 },

                    // COLUMNA 3: AUTORES
                    { id: 'Dahl', color: '#27ae60', column: 2 },
                    { id: 'Bobbio', color: '#27ae60', column: 2 },
                    { id: 'O\'Donell', color: '#27ae60', column: 2 },
                    { id: 'Sartori', color: '#27ae60', column: 2 },
                    { id: 'Przeworski', color: '#27ae60', column: 2 },
                    { id: 'Laswell', color: '#27ae60', column: 2 }
                ],

                data: [
                    // Variables Institucionales → Categoría Institucionales
                    ['Igualdad de oportunidades', 'Institucionales', 1],
                    ['Control ciudadano', 'Institucionales', 1],
                    ['Control y limitación', 'Institucionales', 1],
                    ['Respaldo reglas', 'Institucionales', 1],
                    ['Legitimidad', 'Institucionales', 1],

                    // Variables No Institucionales → Categoría No Institucionales
                    ['Búsqueda no violenta', 'No Institucionales', 1],
                    ['Pluralidad', 'No Institucionales', 1],
                    ['Derechos humanos', 'No Institucionales', 1],
                    ['Tolerancia', 'No Institucionales', 1],
                    ['Racionalidad', 'No Institucionales', 1],
                    ['Paz social', 'No Institucionales', 1],
                    ['Interés colectivo', 'No Institucionales', 1],

                    // Variables Minimalistas → Categoría Minimalistas
                    ['Derecho al voto', 'Minimalistas', 1],
                    ['Mercado', 'Minimalistas', 1],
                    ['Libertad', 'Minimalistas', 1],

                    // Institucionales → Autores
                    ['Institucionales', 'Dahl', 4],
                    ['Institucionales', 'Bobbio', 1],
                    ['Institucionales', 'O\'Donell', 1],

                    // No Institucionales → Autores
                    ['No Institucionales', 'Dahl', 3],
                    ['No Institucionales', 'Sartori', 2],
                    ['No Institucionales', 'Przeworski', 2],
                    ['No Institucionales', 'Bobbio', 1],

                    // Minimalistas → Autores
                    ['Minimalistas', 'Sartori', 2],
                    ['Minimalistas', 'Dahl', 1],
                    ['Minimalistas', 'Laswell', 1],
                    ['Minimalistas', 'Bobbio', 1]
                ],
                type: 'sankey',
                name: 'Tipología Democrática',
                dataLabels: {
                    enabled: true,
                    style: {
                        color: '#000000',
                        fontSize: '11px',
                        fontWeight: 'normal'
                    }
                }
            }]

        });
    </script>
</body>
</html>
