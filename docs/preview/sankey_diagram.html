<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankey Diagram - Tipología de la Democracia</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/highcharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/sankey.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/non-cartesian-zoom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/mouse-wheel-zoom.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/exporting.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/export-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/accessibility.js"></script>
    
    <style>
        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Helvetica,
                Arial,
                "Apple Color Emoji",
                "Segoe UI Emoji",
                "Segoe UI Symbol",
                sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        #csv {
            display: none;
        }

        .highcharts-figure,
        .highcharts-data-table table {
            min-width: 310px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .highcharts-data-table table {
            font-family: Verdana, sans-serif;
            border-collapse: collapse;
            border: 1px solid var(--highcharts-neutral-color-10, #e6e6e6);
            margin: 10px auto;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .highcharts-data-table caption {
            padding: 1em 0;
            font-size: 1.2em;
            color: var(--highcharts-neutral-color-60, #666);
        }

        .highcharts-data-table th {
            font-weight: 600;
            padding: 0.5em;
        }

        .highcharts-data-table td,
        .highcharts-data-table th,
        .highcharts-data-table caption {
            padding: 0.5em;
        }

        .highcharts-data-table thead tr,
        .highcharts-data-table tbody tr:nth-child(even) {
            background: var(--highcharts-neutral-color-3, #f7f7f7);
        }

        .highcharts-description {
            display: none;
        }

        #container {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <figure class="highcharts-figure">
        <div id="container"></div>
        <p class="highcharts-description">
            Los diagramas Sankey se utilizan para visualizar el flujo de datos y el volumen
            entre nodos. Las líneas más anchas indican volúmenes mayores.
        </p>
    </figure>

    <script>
        Highcharts.setOptions({
            chart: {
                backgroundColor: '#ffffff'
            },
            title: {
                style: {
                    color: '#000000'
                }
            },
            subtitle: {
                style: {
                    color: '#000000'
                }
            }
        });

        Highcharts.chart('container', {

            chart: {
                zooming: {
                    type: 'xy'
                },
                panning: {
                    enabled: true,
                    type: 'xy'
                },
                panKey: 'shift',
                backgroundColor: '#ffffff',
                borderColor: '#cccccc',
                borderWidth: 1
            },
            title: {
                text: 'Estimated US Energy Consumption in 2022',
                style: {
                    color: '#000000',
                    fontSize: '16px'
                }
            },
            subtitle: {
                text:
              'Source: <a href=\'https://www.llnl.gov/\' style="color: #0066cc;"> Lawrence Livermore National Laboratory</a>',
                style: {
                    color: '#000000'
                }
            },
            accessibility: {
                point: {
                    valueDescriptionFormat: '{index}. {point.from} to {point.to}, ' +
                        '{point.weight}.'
                }
            },
            tooltip: {
                headerFormat: null,
                pointFormat:
              '{point.fromNode.name} \u2192 {point.toNode.name}: {point.weight:.2f} ' +
              'quads',
                nodeFormat: '{point.name}: {point.sum:.2f} quads',
                backgroundColor: '#ffffff',
                borderColor: '#cccccc',
                style: {
                    color: '#000000'
                }
            },
            series: [{
                keys: ['from', 'to', 'weight'],

                nodes: [
                    {
                        id: 'Electricity & Heat',
                        color: '#ffa500',
                        offset: -110
                    },
                    {
                        id: 'Net Import',
                        color: '000000'
                    },
                    {
                        id: 'Residential',
                        color: '#74ffe7',
                        column: 2,
                        offset: 50
                    },
                    {
                        id: 'Commercial',
                        color: '#8cff74',
                        column: 2,
                        offset: 50
                    },
                    {
                        id: 'Industrial',
                        color: '#ff8da1',
                        column: 2,
                        offset: 50
                    },
                    {
                        id: 'Transportation',
                        color: '#f4c0ff',
                        column: 2,
                        offset: 50
                    },
                    {
                        id: 'Rejected Energy',
                        color: '#e6e6e6',
                        column: 3,
                        offset: -30
                    },
                    {
                        id: 'Energy Services',
                        color: '#F9E79F',
                        column: 3
                    },
                    {
                        id: 'Net Import',
                        color: '000000'
                    },
                    {
                        id: 'Solar',
                        color: '#009c00'
                    },
                    {
                        id: 'Nuclear',
                        color: '#1a8dff'
                    },
                    {
                        id: 'Hydro',
                        color: '#009c00'
                    },
                    {
                        id: 'Wind',
                        color: '#009c00'
                    },
                    {
                        id: 'Geothermal',
                        color: '#009c00'
                    },
                    {
                        id: 'Natural Gas',
                        color: '#1a8dff'
                    },
                    {
                        id: 'Biomass',
                        color: '#009c00'
                    },
                    {
                        id: 'Coal',
                        color: '#989898'
                    },
                    {
                        id: 'Petroleum',
                        color: '#989898',
                        offset: -1
                    }
                ],

                data: [
                    ['Net Import', 'Electricity & Heat', 0.14],
                    ['Solar', 'Electricity & Heat', 1.28],
                    ['Nuclear', 'Electricity & Heat', 8.05],
                    ['Hydro', 'Electricity & Heat', 2.31],
                    ['Wind', 'Electricity & Heat', 3.84],
                    ['Geothermal', 'Electricity & Heat', 0.15],
                    ['Natural Gas', 'Electricity & Heat', 12.5],
                    ['Coal', 'Electricity & Heat', 8.9],
                    ['Biomass', 'Electricity & Heat', 0.41],
                    ['Petroleum', 'Electricity & Heat', 0.24],

                    ['Electricity & Heat', 'Residential', 5.19],
                    ['Solar', 'Residential', 0.4],
                    ['Geothermal', 'Residential', 0.04],
                    ['Natural Gas', 'Residential', 5.17],
                    ['Biomass', 'Residential', 0.48],
                    ['Petroleum', 'Residential', 0.98],

                    ['Electricity & Heat', 'Commercial', 4.69],
                    ['Solar', 'Commercial', 0.16],
                    ['Geothermal', 'Commercial', 0.02],
                    ['Natural Gas', 'Commercial', 3.65],
                    ['Coal', 'Commercial', 0.02],
                    ['Biomass', 'Commercial', 0.15],
                    ['Petroleum', 'Commercial', 0.88],

                    ['Electricity & Heat', 'Industrial', 3.44],
                    ['Solar', 'Industrial', 0.04],
                    ['Natural Gas', 'Industrial', 10.8],
                    ['Coal', 'Industrial', 0.99],
                    ['Biomass', 'Industrial', 2.27],
                    ['Petroleum', 'Industrial', 9.13],

                    ['Electricity & Heat', 'Transportation', 0.02],
                    ['Natural Gas', 'Transportation', 1.29],
                    ['Biomass', 'Transportation', 1.57],
                    ['Petroleum', 'Transportation', 24.6],

                    ['Electricity & Heat', 'Rejected Energy', 24.3],
                    ['Residential', 'Rejected Energy', 4.29],
                    ['Commercial', 'Rejected Energy', 3.35],
                    ['Industrial', 'Rejected Energy', 13.6],
                    ['Transportation', 'Rejected Energy', 21.7],

                    ['Residential', 'Energy Services', 7.97],
                    ['Commercial', 'Energy Services', 6.22],
                    ['Industrial', 'Energy Services', 13.1],
                    ['Transportation', 'Energy Services', 5.77]
                ],
                type: 'sankey',
                name: 'Sankey demo series',
                dataLabels: {
                    style: {
                        color: '#000000'
                    }
                }
            }]

        });
    </script>
</body>
</html>
