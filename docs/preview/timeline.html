        }

            padding: 1rem;
            border-radius: 8px;

            display: inline-block;

            color: white;
            border: none;

            font-size: 14px;

            background: #1a8cd8;
        }

        /* Tooltip */
        .highcharts-tooltip,
        .highcharts-tooltip > span {
            background: #ffffff !important;
            color: #000000 !important;
            border: 1px solid #cccccc !important;
        }

        /* Textos */
        .highcharts-label text,
        .highcharts-text,
        .highcharts-title,
        .highcharts-subtitle {
            fill: #000000 !important;
            color: #000000 !important;
            text-shadow: none !important;
        }

        /* Icono hamburguesa visible y gris */
        .highcharts-contextbutton .highcharts-button-symbol {
            stroke: #666666 !important;
            fill: none !important;
        }

        /* Fondo del botón de menú */
        .highcharts-contextbutton {
            fill: #ffffff !important;
            stroke: #cccccc !important;
        }

        .highcharts-contextbutton:hover {
            fill: #f0f0f0 !important;
        }

        /* Menú de exportación */
        .highcharts-button {
            background: #ffffff !important;
            color: #000000 !important;
            border: 1px solid #cccccc !important;
        }

        .highcharts-button:hover {
            background: #f0f0f0 !important;
        }

        .highcharts-menu {
            background: #ffffff !important;
            border: 1px solid #cccccc !important;
        }

        .highcharts-menu-item {
            background: #ffffff !important;
            color: #000000 !important;
        }

        .highcharts-menu-item:hover {
            background: #f0f0f0 !important;
        }

        /* Globos flotantes blancos */
        .highcharts-label-box {
            fill: #ffffff !important;
            stroke: #cccccc !important;
        }

        .highcharts-label text {
            fill: #000000 !important;
        }

        /* Cursor pointer para indicar que es clickeable */
        .highcharts-point {
            cursor: pointer;
        }

    </style>
</head>

<body>

    <div id="container"></div>
    <p class="highcharts-description">
        La línea del tiempo categoriza las transformaciones de las estructuras, 
        los procesos y los contenidos del sistema político mexicano desde su 
        fundación en el siglo XVI con el Virreinato de la Nueva España hasta la actualidad.
        <strong>Haz clic en cualquier periodo para ver su estructura detallada.</strong>
    </p>
</figure>

<div id="treegraph-container">
    <button class="back-button" onclick="hideTreegraph()">← Volver al Timeline</button>

let timelineChart;
let treegraphChart;

// Crear timeline inicial
function createTimeline() {
    timelineChart = Highcharts.chart('container', {
        chart: {
            type: 'timeline',
            backgroundColor: '#ffffff'
        },

        xAxis: {
            visible: false
        },
        yAxis: {
            visible: false
        },

        title: {
            text: 'Evolución del Sistema Político Mexicano',
            style: {
                color: '#000000',
                fontSize: '24px'
            }
        },

        subtitle: {
            text: 'S. XVI - S. XXI',
            style: {
                color: '#000000'
            }
        },

        colors: ['#3b82f6','#10b981','#f59e0b'],

        series: [{
            data: [
                {
                    name: 'XVI: Fundación',
                    description: 'Fundación del sistema político mexicano hasta el final del Imperio Español <br> en América en el siglo XIX',
                    dataKey: 'fundacion'
                },
                {
                    name: 'XIX: Independencia',
                    description: 'Transformación del sistema político mexicano en los primeros años de independencia entre 1821 y 1876',
                    dataKey: 'independencia'
                },
                {
                    name: 'Posrevolución',
                    description: 'Consolidación del sistema político moderno en México s. XX - s. XXI',
                    dataKey: 'posrevolucion'
                }
            ],
            point: {
                events: {
                    click: function() {
                        showTreegraph(this.options.dataKey);
                    }
                }
            }
        }],

        plotOptions: {
            series: {
                dataLabels: {
                    enabled: true,
                    format: '{point.name}',
                    style: {
                        color: '#000000',
                        textOutline: 'none'
                    }
                }
            }
        }
    });
}

// Mostrar treegraph
function showTreegraph(periodKey) {
    document.getElementById('treegraph-container').classList.add('active');
    document.querySelector('.highcharts-figure').style.display = 'none';
    
    const data = treegraphData[periodKey];
    
    treegraphChart = Highcharts.chart('treegraph', {
        chart: {
            backgroundColor: '#ffffff'
        },
        // ----------------------------------------------------
        // AQUÍ ESTÁ EL CAMBIO DE PALETA DE COLORES
        // Azul claro para Democracia, Naranja para Partitocracia
        // ----------------------------------------------------
        colors: ['#2caffe', '#f59e0b', '#10b981', '#7cb5ec'],
        
        title: {
            text: 'Estructura del Sistema Político - ' + data[0].name,
            style: {
                color: '#000000'
            }
        },
        series: [
            {
                type: 'treegraph',
                data: data,
                tooltip: {
                    pointFormat: '{point.name}'
                },
                marker: {
                    symbol: 'rect',
                    width: '15%'
                },
                borderRadius: 10,
                link: {
                    type: 'curved',
                    lineWidth: 1
                },
                dataLabels: {
                    pointFormat: '{point.name}',
                    style: {
                        whiteSpace: 'nowrap',
                        color: '#000000',
                        textOutline: 'none'
                    }
                },
                levels: [
                    {
                        level: 1,
                        levelIsConstant: false
                    },
                    {
                        level: 2,
                        colorByPoint: true
                    },
                    {
                        level: 3,
                        colorVariation: {
                            key: 'brightness',
                            to: -0.3
                        }
                    },
                    {
                        level: 4,
                        colorVariation: {
                            key: 'brightness',
                            to: 0.3
                        }
                    }
                ]
            }
        ]
    });
}

// Ocultar treegraph y volver al timeline
function hideTreegraph() {
    document.getElementById('treegraph-container').classList.remove('active');
    document.querySelector('.highcharts-figure').style.display = 'block';
    if (treegraphChart) {
        treegraphChart.destroy();
    }
}

// Inicializar timeline al cargar la página
window.addEventListener('DOMContentLoaded', createTimeline);
