<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrera de Financiamiento de Partidos (México)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/highcharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/exporting.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/modules/accessibility.js"></script>

    <style>
        @import url("https://netdna.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css");

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffff;
            color: #333;
        }

        .highcharts-figure {
            max-width: 1000px;
            margin: 1em auto;
        }

        #play-controls {
            margin: 1em auto;
            max-width: 1000px;
            display: flex;
            align-items: center;
        }

        #container {
            height: 400px;
            width: 100%;
            margin: 0 auto;
            background: white;
        }

        #play-pause-button {
            margin-right: 15px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            color: white;
            background-color: #0275ff;
            font-size: 18px;
            transition: background-color 250ms;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #play-pause-button:hover {
            background-color: #0056b3;
        }

        #play-range {
            flex-grow: 1;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <figure class="highcharts-figure">
        <div id="parent-container">
            <div id="play-controls">
                <button id="play-pause-button" class="fa fa-play" title="Reproducir"></button>
                <input id="play-range" type="range" value="2014" min="2014" max="2024" />
            </div>
            <div id="container"></div>
        </div>
    </figure>

    <script>
        const startYear = 2014,
            endYear = 2024,
            btn = document.getElementById('play-pause-button'),
            input = document.getElementById('play-range'),
            nbr = 11;


        Highcharts.setOptions({
            lang: {
                thousandsSep: ','   // <-- evita “10.000”, “11.000”, etc.
            }
        });

        // DATOS CORREGIDOS - Todos los valores como números sin formato
        const dataset = {
  "MC": {
    "2014": "294998736", "2015": "663370998", "2016": "986317474", "2017": "1317883984",
    "2018": "1859637043", "2019": "2249227747", "2020": "2660247620", "2021": "3185979207",
    "2022": "3760304402", "2023": "4375237565"
  },
  "NUAL": {
    "2014": "297287967", "2015": "668514980", "2016": "920539365", "2017": "1179290290",
    "2018": "1603127607", "2019": "1603127607", "2020": "1603127607", "2021": "1603127607",
    "2022": "1603127607", "2023": "1603127607"
  },
  "PAN": {
    "2014": "928182289", "2015": "2086156957", "2016": "2856648448", "2017": "3647708623",
    "2018": "4933554274", "2019": "5834403925", "2020": "6784811346", "2021": "8000630709",
    "2022": "9076029297", "2023": "10227470627"
  },
  "PRD": {
    "2014": "710194764", "2015": "1596331238", "2016": "2061561170", "2017": "2539209849",
    "2018": "3317524735", "2019": "3740031960", "2020": "4185779366", "2021": "4755941058",
    "2022": "5180107632", "2023": "5634263296"
  },
  "PRI": {
    "2014": "1102999650", "2015": "2478977784", "2016": "3495152718", "2017": "4538455643",
    "2018": "6232776921", "2019": "7082149232", "2020": "7978247117", "2021": "9124583327",
    "2022": "10178624409", "2023": "11307197878"
  },
  "PT": {
    "2014": "312133728", "2015": "701873934", "2016": "928434674", "2017": "1161042121",
    "2018": "1542543339", "2019": "1913748984", "2020": "2305372283", "2021": "2806288060",
    "2022": "3212395267", "2023": "3647214448"
  },
  "PVEM": {
    "2014": "356221758", "2015": "444719546", "2016": "800941304", "2017": "1157939134",
    "2018": "1740875039", "2019": "2144844439", "2020": "2571034098", "2021": "3116173781",
    "2022": "3620364907", "2023": "4160204279"
  },
  "MORENA": {
    "2014": "0", "2015": "42683398", "2016": "433111382", "2017": "833961034",
    "2018": "1487909489", "2019": "3116242904", "2020": "4834159012", "2021": "7031922370",
    "2022": "8815544300", "2023": "10725292919"
  },
  "ES": {
    "2014": "0", "2015": "42683398", "2016": "282232860", "2017": "528175804",
    "2018": "931272195", "2019": "931272195", "2020": "931272195", "2021": "987768505",
    "2022": "987768505", "2023": "987768505"
  },
  "Otro": {
    "2014": "0", "2015": "42683398", "2016": "42683399", "2017": "42683400",
    "2018": "42683401", "2019": "42683402", "2020": "42683403", "2021": "155676017",
    "2022": "155676018", "2023": "155676019"
  },
  "Independientes": {
    "2014": "0", "2015": "17918751", "2016": "17918752", "2017": "17918753",
    "2018": "93953612", "2019": "93953613", "2020": "93953614", "2021": "115054953",
    "2022": "115054954", "2023": "115054955"
  }
}

        let chart;

        const partyColors = {
            "MC": "#FF8000",
            "NUAL": "#00FFFF",
            "PAN": "#006AFF",
            "PRD": "#FFE100",
            "PRI": "#48FF00",
            "PT": "#FF0000",
            "PVEM": "#00FF99",
            "MORENA": "#800040",
            "ES": "#8400FF",
            "Otro": "#4769BA",
            "Independientes": "#5ED7FF"
        };

        // CÓDIGO DE ANIMACIÓN CORREGIDO
        (function (H) {
            const FLOAT = /^-?\d+\.?\d*$/;
            
            H.Fx.prototype.textSetter = function () {
                const chart = H.charts[this.elem.renderer.chartIndex];
                
                // Función para limpiar cualquier formato de número
                function cleanNumber(str) {
                    if (typeof str !== 'string') return str;
                    // Remover todos los separadores (comas, puntos como separadores de miles, espacios)
                    return str.replace(/[,\s]/g, '').replace(/\.(?=\d{3})/g, '');
                }
                
                let startValue = cleanNumber(this.start);
                let endValue = cleanNumber(this.end);
                let currentValue = endValue;
                
                if (startValue && startValue.match(FLOAT)) {
                    startValue = parseFloat(startValue);
                    endValue = parseFloat(endValue);
                    
                    // Calcular valor actual en la animación
                    const interpolated = Math.round(startValue + (endValue - startValue) * this.pos);
                    
                    // Formatear con separadores de miles
                    currentValue = chart.numberFormatter(interpolated, 0);
                }
                
                this.elem.endText = this.end;
                this.elem.attr(this.prop, currentValue, null, true);
            };

            H.SVGElement.prototype.textGetter = function () {
                const ct = this.text.element.textContent || '';
                return this.endText ? this.endText : ct.substring(0, ct.length / 2);
            };

            H.wrap(H.Series.prototype, 'drawDataLabels', function (proceed) {
                const attr = H.SVGElement.prototype.attr, 
                      chart = this.chart;
                      
                if (chart.sequenceTimer) {
                    this.points.forEach(point =>
                        (point.dataLabels || []).forEach(label =>
                            (label.attr = function (hash) {
                                if (hash && hash.text !== undefined && chart.isResizing === 0) {
                                    const text = hash.text;
                                    delete hash.text;
                                    return this.attr(hash).animate({ text });
                                }
                                return attr.apply(this, arguments);
                            })
                        )
                    );
                }
                
                const ret = proceed.apply(this, Array.prototype.slice.call(arguments, 1));
                this.points.forEach(p => (p.dataLabels || []).forEach(d => (d.attr = attr)));
                return ret;
            });
        }(Highcharts));

        function getData(year) {
            const output = Object.entries(dataset)
                .map(entry => {
                    const [partyName, partyData] = entry;
                    // Parsear el valor limpiando cualquier formato
                    const rawValue = partyData[year].toString().replace(/[,\s]/g, '');
                    return {
                        name: partyName,
                        y: parseFloat(rawValue),
                        color: partyColors[partyName] || null
                    };
                })
                .sort((a, b) => b.y - a.y);
            return output.slice(0, nbr);
        }

        function getSubtitle() {
            const data = getData(input.value);
            const totalFunding = data.reduce((acc, curr) => acc + curr.y, 0);
            const formattedTotal = (totalFunding / 1000000).toFixed(1); 
            return `<span style="font-size: 80px; font-weight: bold; color: #ccc;">${input.value}</span><br>
                <span style="font-size: 22px; color: #666;">
                    Total Erogado: <b>$${formattedTotal}</b> Millones MXN
                </span>`;
        }

        chart = Highcharts.chart('container', {
            chart: {
                animation: { duration: 2500 },
                marginRight: 50,
                style: { fontFamily: 'Roboto, sans-serif' }
            },
            title: {
                text: 'Prerrogativas a partidos políticos y candidaturas independientes en México entre 2014-2023',
                align: 'left'
            },
            subtitle: {
                text: getSubtitle(),
                floating: true,
                align: 'right',
                verticalAlign: 'bottom',
                useHTML: true,
                y: -20,
                x: -20
            },
            legend: { enabled: false },
            xAxis: { type: 'category' },
            yAxis: {
                opposite: true,
                tickPixelInterval: 150,
                title: { text: null },
                labels: {
                    formatter: function() { 
                        return '$' + (this.value / 1000000).toFixed(0) + 'M'; 
                    }
                }
            },
            plotOptions: {
                series: {
                    animation: false,
                    groupPadding: 0,
                    pointPadding: 0.1,
                    borderWidth: 0,
                    dataSorting: { enabled: true, matchByName: true },
                    type: 'bar',
                    dataLabels: { 
                        enabled: true,
                        formatter: function() {
                            return Highcharts.numberFormat(this.y, 0);
                        }
                    }
                }
            },
            series: [{
                type: 'bar',
                name: startYear.toString(),
                data: getData(startYear)
            }],
            responsive: {
                rules: [{
                    condition: { maxWidth: 550 },
                    chartOptions: {
                        xAxis: { visible: false },
                        subtitle: { x: 0 },
                        plotOptions: {
                            series: {
                                dataLabels: [
                                    { enabled: true, y: 8 }, 
                                    { 
                                        enabled: true, 
                                        format: '{point.name}', 
                                        y: -8, 
                                        style: { fontWeight: 'normal', opacity: 0.7 } 
                                    }
                                ]
                            }
                        }
                    }
                }]
            }
        });

        function pause(button) {
            button.title = 'Reproducir';
            button.className = 'fa fa-play';
            clearTimeout(chart.sequenceTimer);
            chart.sequenceTimer = undefined;
        }

        function update(increment) {
            if (increment) {
                input.value = parseInt(input.value, 10) + increment;
            }
            if (input.value >= endYear) {
                pause(btn);
            }
            chart.update({ subtitle: { text: getSubtitle() } }, false, false, false);
            chart.series[0].update({
                name: input.value,
                data: getData(input.value)
            });
        }

        function play(button) {
            button.title = 'Pausar';
            button.className = 'fa fa-pause';
            chart.sequenceTimer = setInterval(function () {
                update(1);
            }, 700);
        }

        btn.addEventListener('click', function () {
            if (chart.sequenceTimer) pause(this);
            else play(this);
        });

        input.addEventListener('input', function () {
            update();
        });
    </script>
</body>
</html>
